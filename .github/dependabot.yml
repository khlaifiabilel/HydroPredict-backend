version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      torch:
        patterns:
          - "torch*"
          - "pytorch*"
      fastapi:
        patterns:
          - "fastapi*"
          - "uvicorn*"
          - "starlette*"
      aws:
        patterns:
          - "boto3*"
          - "botocore*"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"
    ignore:
      # Ignore major version updates for PyTorch (need manual testing)
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"

